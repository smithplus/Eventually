name: Eventually
options:
  bundleIdPrefix: app.tabella
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"
    PRODUCT_BUNDLE_IDENTIFIER: app.tabella.Eventually
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Sources/Eventually/Info.plist
    CODE_SIGN_ENTITLEMENTS: Sources/Eventually/Eventually.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Xcode-recommended settings (kept here so they survive xcodegen regen)
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Eventually:
    type: application
    platform: macOS
    sources:
      - path: Sources/Eventually
    resources:
      - path: Resources
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: Eventually
        INFOPLIST_FILE: Sources/Eventually/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Eventually/Eventually.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES

  EventuallyWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/EventuallyWidget
    settings:
      base:
        PRODUCT_NAME: EventuallyWidget
        PRODUCT_BUNDLE_IDENTIFIER: app.tabella.Eventually.EventuallyWidget
        INFOPLIST_FILE: Sources/EventuallyWidget/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks @executable_path/../Frameworks"
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Eventually

  EventuallyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/Eventually/Services/QuickAddParser.swift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

schemes:
  Eventually:
    build:
      targets:
        Eventually: all
        EventuallyWidget: all
    test:
      targets:
        - EventuallyTests
    run:
      config: Debug
